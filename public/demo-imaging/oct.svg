<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Demo OCT B-scan (fictional)">
  <rect width="800" height="600" fill="#05080b"/>
  <g transform="translate(90,90)">
    <rect x="0" y="0" width="620" height="400" fill="#0a1119" stroke="#1e2a38" stroke-width="1"/>
    <!-- retinal layers with a central foveal pit -->
    <path d="M0 90 Q160 70 300 150 Q320 165 340 150 Q480 70 620 90" fill="none" stroke="#f6e05e" stroke-width="4"/>
    <path d="M0 130 Q160 112 300 185 Q320 200 340 185 Q480 112 620 130" fill="none" stroke="#68d391" stroke-width="3" opacity="0.85"/>
    <path d="M0 175 Q160 160 300 220 Q320 233 340 220 Q480 160 620 175" fill="none" stroke="#4fd1c5" stroke-width="3" opacity="0.8"/>
    <path d="M0 235 Q160 225 300 270 Q320 280 340 270 Q480 225 620 235" fill="none" stroke="#63b3ed" stroke-width="3" opacity="0.7"/>
    <path d="M0 320 Q160 315 310 330 Q470 345 620 322" fill="none" stroke="#b794f4" stroke-width="5" opacity="0.7"/>
    <!-- scan artifacts -->
    <line x1="0" y1="0" x2="0" y2="400" stroke="#1e2a38"/>
    <line x1="620" y1="0" x2="620" y2="400" stroke="#1e2a38"/>
  </g>
  <text x="400" y="565" text-anchor="middle" fill="#a0aec0" font-family="system-ui,sans-serif" font-size="17">DEMO OCT B-scan - fictional, not a real patient</text>
</svg>
