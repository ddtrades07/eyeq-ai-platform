<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Demo visual field grayscale (fictional)">
  <rect width="800" height="600" fill="#f7f7f5"/>
  <g transform="translate(400,290)">
    <circle r="240" fill="#ffffff" stroke="#d0d0cc" stroke-width="2"/>
    <line x1="-240" y1="0" x2="240" y2="0" stroke="#d9d9d5"/>
    <line x1="0" y1="-240" x2="0" y2="240" stroke="#d9d9d5"/>
    <!-- test point grid; a superior arcuate cluster is darker (defect) -->
    <g fill="#2b2b2b">
      <!-- normal-ish points -->
      <circle cx="-150" cy="60" r="10"/><circle cx="-90" cy="60" r="9"/><circle cx="-30" cy="60" r="10"/>
      <circle cx="30" cy="60" r="9"/><circle cx="90" cy="60" r="10"/><circle cx="150" cy="60" r="9"/>
      <circle cx="-150" cy="130" r="10"/><circle cx="-90" cy="130" r="9"/><circle cx="-30" cy="130" r="10"/>
      <circle cx="30" cy="130" r="9"/><circle cx="90" cy="130" r="10"/><circle cx="150" cy="130" r="9"/>
      <circle cx="-120" cy="0" r="9"/><circle cx="120" cy="0" r="9"/>
    </g>
    <!-- superior defect cluster: darker/denser -->
    <g fill="#000">
      <rect x="-170" y="-150" width="26" height="26"/><rect x="-120" y="-150" width="30" height="30"/>
      <rect x="-70" y="-150" width="30" height="30"/><rect x="-20" y="-150" width="26" height="26"/>
      <rect x="-150" y="-110" width="30" height="30"/><rect x="-100" y="-110" width="34" height="34"/>
      <rect x="-50" y="-110" width="30" height="30"/>
      <rect x="30" y="-140" width="18" height="18"/><rect x="80" y="-140" width="16" height="16"/>
      <rect x="40" y="-100" width="16" height="16"/><rect x="90" y="-100" width="14" height="14"/>
    </g>
  </g>
  <text x="400" y="565" text-anchor="middle" fill="#555" font-family="system-ui,sans-serif" font-size="17">DEMO visual field, superior defect - fictional, not a real patient</text>
</svg>
